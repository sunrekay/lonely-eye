services:
  postgres:
    image: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"

  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build:
      context: .
    env_file:
      - .env
    container_name: lonely_eye
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker lonely_eye.main:app --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
